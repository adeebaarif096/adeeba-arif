<script>

let m= Number(prompt("insert your marks"));

if (m>=90 && m<=100){
    alert ("Grade:A")
}


else if (m>=80){
    alert ("Grade:B")
}

else if (m>=70){
    alert ("Grade:C")
}


else if (m>=60){
    alert ("Grade:D")
}

else if (m>=50){
    alert ("Grade:E")
}

else {
    alert ("Try again you are fail")
}
</script>
